<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VehicleHub — Vehicles</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="#">VehicleHub</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
        aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="#vehicles">Vehicles</a></li>
          <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <header class="hero text-white d-flex align-items-center">
    <div class="container text-center">
      <h1 class="display-5">Find Your Next Ride</h1>
      <p class="lead">Cars, bikes, and trucks — explore our selection</p>
    </div>
  </header>

  <!-- VEHICLE GRID -->
  <section id="vehicles" class="py-5">
    <div class="container">
      <div class="row">

        <!-- Vehicle Card 1 -->
        <div class="col-sm-6 col-md-4 col-lg-3 mb-4">
          <div class="card h-100">
            <img src="images/car1.jpg" class="card-img-top" alt="Toyota Prius">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">Toyota Prius</h5>
              <p class="card-text small">Eco-friendly hybrid • $50/day</p>
              <a href="#contact" class="btn btn-primary mt-auto">Rent</a>
            </div>
          </div>
        </div>

        <!-- Vehicle Card 2 -->
        <div class="col-sm-6 col-md-4 col-lg-3 mb-4">
          <div class="card h-100">
            <img src="images/car2.jpg" class="card-img-top" alt="Yamaha R15">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">Yamaha R15</h5>
              <p class="card-text small">Sport bike • $25/day</p>
              <a href="#contact" class="btn btn-primary mt-auto">Rent</a>
            </div>
          </div>
        </div>

        <!-- Add more vehicle cards here -->

      </div>
    </div>
  </section>

  <!-- CONTACT FORM -->
  <section id="contact" class="py-5 bg-light">
    <div class="container">
      <h3>Contact / Booking</h3>
      <form class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" required>
        </div>
        <div class="col-12">
          <label class="form-label">Message</label>
          <textarea class="form-control" rows="3"></textarea>
        </div>
        <div class="col-12 text-end">
          <button class="btn btn-success">Send</button>
        </div>
      </form>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="py-3 text-center">
    <div class="container">
      <small>© 2025 VehicleHub</small>
    </div>
  </footer>

  <!-- Bootstrap JS Bundle (no custom JavaScript needed) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
