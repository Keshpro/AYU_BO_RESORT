<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vehicle Listing — VehicleHub</title>

  <!-- Bootstrap CSS (use official docs for newest CDN if you want). -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Your custom styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="#">VehicleHub</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
        aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="#vehicles">Vehicles</a></li>
          <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <header class="hero d-flex align-items-center text-white">
    <div class="container text-center">
      <h1 class="display-5">Find Your Next Ride</h1>
      <p class="lead">Cars, bikes, trucks — search and compare.</p>
    </div>
  </header>

  <!-- SEARCH + FILTER -->
  <section class="py-4 bg-light">
    <div class="container">
      <div class="row g-2 align-items-center">
        <div class="col-md-6">
          <input id="searchInput" class="form-control" placeholder="Search by model, make, or feature..." aria-label="Search vehicles">
        </div>
        <div class="col-md-3">
          <select id="typeFilter" class="form-select" aria-label="Filter by type">
            <option value="">All types</option>
            <option value="car">Car</option>
            <option value="bike">Bike</option>
            <option value="truck">Truck</option>
          </select>
        </div>
        <div class="col-md-3 text-end">
          <a href="#contact" class="btn btn-primary">Contact to Rent</a>
        </div>
      </div>
    </div>
  </section>

  <!-- VEHICLE GRID -->
  <section id="vehicles" class="py-5">
    <div class="container">
      <div class="row" id="vehicleGrid">

        <!-- VEHICLE CARD (repeat for each vehicle) -->
        <div class="col-sm-6 col-md-4 col-lg-3 mb-4 vehicle-card" data-name="toyota prius" data-type="car" data-price="50">
          <div class="card h-100">
            <img src="images/car1.jpg" class="card-img-top" alt="Toyota Prius white sedan">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">Toyota Prius</h5>
              <p class="card-text small mb-2">Eco-friendly hybrid • 5 seats</p>
              <div class="mt-auto">
                <button class="btn btn-outline-primary btn-sm btn-view" 
                        data-bs-toggle="modal" data-bs-target="#vehicleModal"
                        data-name="Toyota Prius"
                        data-img="images/car1.jpg"
                        data-type="Car"
                        data-price="$50/day"
                        data-desc="Fuel-efficient hybrid perfect for city driving.">
                  View details
                </button>
                <a href="#contact" class="btn btn-primary btn-sm ms-2">Rent</a>
              </div>
            </div>
          </div>
        </div>

        <!-- Example vehicle 2 -->
        <div class="col-sm-6 col-md-4 col-lg-3 mb-4 vehicle-card" data-name="yamaha r15" data-type="bike" data-price="25">
          <div class="card h-100">
            <img src="images/car2.jpg" class="card-img-top" alt="Yamaha R15 sport bike">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">Yamaha R15</h5>
              <p class="card-text small mb-2">Sport bike • 2 seats</p>
              <div class="mt-auto">
                <button class="btn btn-outline-primary btn-sm btn-view" 
                        data-bs-toggle="modal" data-bs-target="#vehicleModal"
                        data-name="Yamaha R15"
                        data-img="images/car2.jpg"
                        data-type="Bike"
                        data-price="$25/day"
                        data-desc="Lightweight sport bike with great handling.">
                  View details
                </button>
                <a href="#contact" class="btn btn-primary btn-sm ms-2">Rent</a>
              </div>
            </div>
          </div>
        </div>

        <!-- add more cards as needed -->

      </div>
    </div>
  </section>

  <!-- VEHICLE DETAILS MODAL (single modal reused) -->
  <div class="modal fade" id="vehicleModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Vehicle Name</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <img id="modalImage" src="" alt="" class="img-fluid rounded">
            </div>
            <div class="col-md-6">
              <p id="modalType" class="mb-2"><strong>Type:</strong> </p>
              <p id="modalPrice" class="mb-2"><strong>Price:</strong> </p>
              <p id="modalDesc"></p>
              <a href="#contact" class="btn btn-primary">Rent Now</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- CONTACT SECTION (simple) -->
  <section id="contact" class="py-5 bg-light">
    <div class="container">
      <h3>Contact / Booking</h3>
      <form class="row g-3" id="bookingForm">
        <div class="col-md-6">
          <label class="form-label">Name</label>
          <input class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Phone / Email</label>
          <input class="form-control" required>
        </div>
        <div class="col-12">
          <label class="form-label">Message</label>
          <textarea class="form-control" rows="3"></textarea>
        </div>
        <div class="col-12 text-end">
          <button class="btn btn-success">Send Booking Request</button>
        </div>
      </form>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="py-3 text-center">
    <div class="container">
      <small>© VehicleHub</small>
    </div>
  </footer>

  <!-- Bootstrap JS (bundle includes Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Your JS -->
  <script src="js/script.js"></script>
</body>
</html>
